version: '3.8'

services:
  # 1. Database MySQL
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: my_database
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql # Lưu dữ liệu ra máy thật, tắt máy không mất data

  # 2. Backend Java
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      # Quan trọng: URL kết nối DB phải dùng tên service "db" thay vì "localhost"
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/my_database
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
    depends_on:
      - db # Đợi database chạy xong mới chạy backend

  # 3. Frontend React
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080 # FE gọi API qua cổng này trên trình duyệt
    depends_on:
      - backend